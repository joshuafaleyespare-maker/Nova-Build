<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaBuild — Product</title>
  <meta name="robots" content="index, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:#fff; --off-white:#F5F9FA; --teal-light:#E0FAFA; --teal-mid:#B8ECEC;
      --turquoise:#00C9C9; --turquoise-dk:#009E9E; --navy:#0D2030;
      --slate:#4A6B7A; --slate-light:#7A9AAA; --green:#00B87A;
      --border:#D4EEF0; --shadow-sm:0 2px 8px rgba(13,32,48,0.06);
    }
    body { background: var(--off-white); color: var(--navy); font-family: 'Sora', sans-serif; line-height: 1.6; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 68px;
      background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .logo img { height: 52px; width: auto; display: block; }
    .nav-right { display: flex; align-items: center; gap: 1.2rem; }
    .nav-link { color: var(--slate); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
    .nav-link:hover { color: var(--navy); }
    .nav-cart-btn { position: relative; background: none; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 8px; color: var(--navy); display: flex; align-items: center; justify-content: center; }
    .nav-cart-btn:hover { background: var(--teal-light); }
    .cart-count { position: absolute; top: -4px; right: -4px; background: var(--turquoise); color: #fff; font-size: 0.58rem; font-weight: 700; min-width: 18px; height: 18px; border-radius: 9px; padding: 0 4px; display: flex; align-items: center; justify-content: center; }

    /* CART DRAWER */
    .cart-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(13,32,48,0.45); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .cart-backdrop.open { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 201; width: 420px; max-width: 100vw; background: #fff; box-shadow: -8px 0 40px rgba(13,32,48,0.14); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.32,0,0.15,1); }
    .cart-drawer.open { transform: translateX(0); }
    .cart-drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .cart-drawer-title { font-weight: 700; font-size: 1rem; }
    .cart-close-btn { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--slate); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
    .cart-close-btn:hover { background: var(--teal-light); }
    .cart-scroll { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .c-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .c-thumb { width: 56px; height: 56px; border-radius: 10px; background: var(--teal-light); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; overflow: hidden; }
    .c-name { font-weight: 600; font-size: 0.88rem; }
    .c-variant { font-size: 0.75rem; color: var(--slate); font-weight: 300; }
    .c-price { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.88rem; margin-left: auto; white-space: nowrap; }
    .c-controls { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .qty-c { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; }
    .qty-c button { background: none; border: none; cursor: pointer; width: 28px; height: 28px; font-size: 1rem; color: var(--navy); }
    .qty-c button:disabled { color: var(--slate-light); cursor: not-allowed; }
    .qty-c span { min-width: 26px; text-align: center; font-family: 'Space Mono', monospace; font-size: 0.8rem; font-weight: 700; }
    .c-remove { background: none; border: none; cursor: pointer; font-size: 0.72rem; color: var(--slate); text-decoration: underline; }
    .cart-summary-section { padding: 16px 24px; border-top: 1px solid var(--border); }
    .cart-summary-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
    .cart-summary-row .s-lbl { color: var(--slate); font-weight: 300; }
    .cart-summary-row .s-val { font-weight: 600; font-family: 'Space Mono', monospace; }
    .cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; padding-top: 8px; border-top: 2px solid var(--border); }
    .cart-total-row .t-lbl { font-weight: 700; }
    .cart-total-row .t-val { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.05rem; }
    .cart-cta-section { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 10px; }
    .btn-checkout { display: block; text-align: center; background: var(--turquoise); color: #fff; padding: 14px; border-radius: 9px; font-weight: 700; font-size: 0.95rem; text-decoration: none; }
    .btn-checkout:hover { background: var(--turquoise-dk); }
    .btn-cont-shop { display: block; text-align: center; background: none; border: none; color: var(--slate); font-size: 0.82rem; font-weight: 500; font-family: 'Sora', sans-serif; cursor: pointer; text-decoration: underline; }
    .cart-empty-state { text-align: center; padding: 48px 0; color: var(--slate); }
    .empty-box { font-size: 2.5rem; margin-bottom: 12px; }
    .toast-notif { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 999px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; }
    .toast-notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* PAGE */
    .page { max-width: 1000px; margin: 0 auto; padding: 32px 5% 80px; }

    .breadcrumb { font-size: 0.78rem; color: var(--slate); margin-bottom: 28px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .breadcrumb a { color: var(--turquoise); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }

    /* IMAGE SIDE */
    .product-img-wrap {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 24px; }
    .product-img-emoji { font-size: 6rem; }
    .badge-sale-img {
      position: absolute; top: 14px; left: 14px;
      background: var(--turquoise); color: #fff;
      font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .product-thumbs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .product-thumb {
      width: 70px; height: 70px; border-radius: 10px; border: 2px solid var(--border);
      overflow: hidden; cursor: pointer; background: var(--white);
      display: flex; align-items: center; justify-content: center; transition: border-color 0.2s;
    }
    .product-thumb.active { border-color: var(--turquoise); }
    .product-thumb img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }

    /* INFO SIDE */
    .product-tag { font-size: 0.7rem; font-weight: 700; color: var(--turquoise); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .product-name { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: 10px; }
    .product-tagline { font-size: 0.95rem; color: var(--slate); font-weight: 300; margin-bottom: 20px; }

    .price-block { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
    .price-now { font-family: 'Space Mono', monospace; font-size: 1.8rem; font-weight: 700; color: var(--navy); }
    .price-was { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--slate-light); text-decoration: line-through; }
    .price-save { background: #E8FFF5; color: var(--green); font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 999px; }

    .stock-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.78rem; font-weight: 600; color: #E05555; margin-bottom: 16px; }
    .low-dot { width: 7px; height: 7px; background: #E05555; border-radius: 50%; display: inline-block; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .btn-add {
      display: block; width: 100%; text-align: center;
      background: var(--turquoise); color: #fff;
      padding: 16px; border-radius: 10px; font-weight: 700; font-size: 1rem;
      border: none; cursor: pointer; font-family: 'Sora', sans-serif;
      transition: background 0.2s; margin-bottom: 12px;
    }
    .btn-add:hover { background: var(--turquoise-dk); }
    .btn-cart { display: block; width: 100%; text-align: center; background: none; border: 1.5px solid var(--border); color: var(--navy); padding: 14px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; font-family: 'Sora', sans-serif; cursor: pointer; text-decoration: none; transition: border-color 0.2s; }
    .btn-cart:hover { border-color: var(--turquoise); color: var(--turquoise); }

    .shipping-note { font-size: 0.78rem; color: var(--slate); font-weight: 300; text-align: center; margin-top: 10px; }
    .shipping-note strong { color: var(--green); }

    /* FEATURES */
    .product-features { margin-top: 28px; }
    .features-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate); margin-bottom: 12px; }
    .feature-item { display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; color: var(--slate); font-weight: 300; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .feature-item:last-child { border-bottom: none; }
    .feature-check { color: var(--turquoise); font-weight: 700; font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }

    /* SPECS */
    .specs-block { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-top: 36px; }
    .specs-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate); margin-bottom: 16px; }
    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .spec-item { }
    .spec-key { font-size: 0.7rem; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.06em; }
    .spec-val { font-size: 0.88rem; font-weight: 500; color: var(--navy); margin-top: 2px; }

    /* RELATED */
    .related-section { margin-top: 56px; }
    .related-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; }
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .related-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; text-decoration: none; color: var(--navy); transition: box-shadow 0.2s; display: block; }
    .related-card:hover { box-shadow: 0 6px 24px rgba(13,32,48,0.10); }
    .related-img { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: var(--white); overflow: hidden; border-bottom: 1px solid var(--border); }
    .related-img img { width: 100%; height: 100%; object-fit: contain; padding: 16px; }
    .related-body { padding: 12px 16px; }
    .related-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; }
    .related-price { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--turquoise); font-weight: 700; }

    @media (max-width: 700px) {
      .product-layout { grid-template-columns: 1fr; gap: 28px; }
      .product-name { font-size: 1.5rem; }
      .related-grid { grid-template-columns: 1fr 1fr; }
      .specs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- CART DRAWER -->
<div id="cart-backdrop" class="cart-backdrop" onclick="CartUI.closeDrawer()"></div>
<div id="cart-drawer" class="cart-drawer" role="dialog" aria-label="Shopping cart">
  <div class="cart-drawer-head">
    <span class="cart-drawer-title">Your Cart</span>
    <button id="cart-close-btn" class="cart-close-btn" onclick="CartUI.closeDrawer()">×</button>
  </div>
  <div id="cart-scroll" class="cart-scroll"></div>
  <div id="cart-upsell" class="cart-upsell" style="display:none"></div>
  <div id="cart-summary-section" class="cart-summary-section"></div>
  <div id="cart-cta-section" class="cart-cta-section" style="display:none">
    <a href="checkout.html" class="btn-checkout">CHECKOUT →</a>
    <button class="btn-cont-shop" onclick="CartUI.closeDrawer()">CONTINUE SHOPPING</button>
  </div>
</div>
<div id="toast-notif" class="toast-notif"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <img src="Logo Rectangle.png" alt="NovaBuild">
  </a>
  <div class="nav-right">
    <a href="index.html#products" class="nav-link">All Kits</a>
    <button id="nav-cart-btn" class="nav-cart-btn" onclick="CartUI.renderDrawer();CartUI.openDrawer()" aria-label="Cart">
      <svg width="22" height="20" viewBox="0 0 22 20" fill="none">
        <path d="M1 1h3l2.4 9H17l2.6-6.5H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="18" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="18" r="1.5" fill="currentColor"/>
      </svg>
      <span id="cart-count" class="cart-count" style="display:none">0</span>
    </button>
  </div>
</nav>

<div class="page" id="product-page"></div>

<script src="products-config.js"></script>
<script src="novabuild.js"></script>
<script>
const id = new URLSearchParams(window.location.search).get('id');
const p  = PRODUCTS[id];
const pd = PRODUCT_DETAILS?.[id];

if (!p) {
  document.getElementById('product-page').innerHTML = `
    <div style="text-align:center;padding:80px 24px">
      <div style="font-size:3rem;margin-bottom:16px">🤖</div>
      <h2 style="margin-bottom:12px">Product not found</h2>
      <a href="index.html#products" style="color:#00C9C9">← View all kits</a>
    </div>`;
} else {
  document.title = `${p.name} — NovaBuild`;

  const savings    = Math.round((1 - p.price / p.was) * 100);
  const isLowStock = p.stock <= 5;
  const mainImage  = pd?.image ? encodeURI(pd.image) : null;
  const features   = pd?.features || [];
  const specs      = pd?.specs    || {};
  const thumbs     = pd?.images   || (mainImage ? [{ src: pd.image, label: p.name }] : []);

  const featureHTML = features.length
    ? features.map(f => `<div class="feature-item"><span class="feature-check">✓</span>${f}</div>`).join('')
    : '';

  const specsHTML = Object.keys(specs).length
    ? `<div class="specs-block">
        <div class="specs-title">Specifications</div>
        <div class="specs-grid">
          ${Object.entries(specs).map(([k,v]) => `
            <div class="spec-item">
              <div class="spec-key">${k}</div>
              <div class="spec-val">${v}</div>
            </div>`).join('')}
        </div>
      </div>`
    : '';

  const thumbsHTML = thumbs.length > 1
    ? `<div class="product-thumbs">
        ${thumbs.map((img, i) => `
          <div class="product-thumb ${i===0?'active':''}" onclick="switchImg('${encodeURI(img.src)}',this)">
            <img src="${encodeURI(img.src)}" alt="${img.label}">
          </div>`).join('')}
      </div>`
    : '';

  const relatedHTML = Object.values(PRODUCTS)
    .filter(r => r.id !== id && PRODUCT_DETAILS?.[r.id]?.image)
    .slice(0, 3)
    .map(r => {
      const ri = PRODUCT_DETAILS[r.id].image;
      return `
        <a href="product.html?id=${r.id}" class="related-card">
          <div class="related-img">
            <img src="${encodeURI(ri)}" alt="${r.name}">
          </div>
          <div class="related-body">
            <div class="related-name">${r.name}</div>
            <div class="related-price">AUD $${r.price.toFixed(2)}</div>
          </div>
        </a>`;
    }).join('');

  document.getElementById('product-page').innerHTML = `
    <div class="breadcrumb">
      <a href="index.html">Home</a> /
      <a href="index.html#products">All Kits</a> /
      <span>${p.name}</span>
    </div>

    <div class="product-layout">
      <div>
        <div class="product-img-wrap">
          ${mainImage
            ? `<img id="main-img" src="${mainImage}" alt="${p.name}"
                onerror="this.style.display='none';document.getElementById('img-emoji').style.display='flex'">`
            : ''}
          <div id="img-emoji" class="product-img-emoji" style="${mainImage?'display:none':''}">
            ${p.emoji}
          </div>
          <div class="badge-sale-img">${savings}% OFF</div>
        </div>
        ${thumbsHTML}
      </div>

      <div>
        <div class="product-tag">${p.variant} · Ages ${p.ages}</div>
        <h1 class="product-name">${p.name}</h1>
        <p class="product-tagline">${pd?.tagline || pd?.description || p.variant}</p>

        <div class="price-block">
          <span class="price-now">$${p.price.toFixed(2)}</span>
          <span class="price-was">$${p.was.toFixed(2)}</span>
          <span class="price-save">SAVE ${savings}%</span>
        </div>

        ${isLowStock ? `<div class="stock-badge"><span class="low-dot"></span>Only ${p.stock} left in stock</div>` : ''}

        <button class="btn-add" onclick="Cart.add('${id}');CartUI.openDrawer();CartUI.showToast('${p.name} added to cart')">
          ADD TO CART
        </button>
        <a href="cart.html" class="btn-cart">VIEW CART</a>
        <p class="shipping-note">🚚 <strong>Free shipping</strong> on orders over $99 · Fast Australian delivery</p>

        ${featureHTML ? `<div class="product-features"><div class="features-title">What's included</div>${featureHTML}</div>` : ''}
      </div>
    </div>

    ${specsHTML}

    ${relatedHTML ? `
      <div class="related-section">
        <div class="related-title">You might also like</div>
        <div class="related-grid">${relatedHTML}</div>
      </div>` : ''}
  `;
}

function switchImg(src, el) {
  const main = document.getElementById('main-img');
  if (main) main.src = src;
  document.querySelectorAll('.product-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>

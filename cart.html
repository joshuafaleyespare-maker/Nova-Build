<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart  NovaBuild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #fff; --off-white: #F5F9FA; --teal-light: #E0FAFA;
      --teal-mid: #B8ECEC; --turquoise: #00C9C9; --turquoise-dk: #009E9E;
      --navy: #0D2030; --slate: #4A6B7A; --slate-light: #7A9AAA;
      --red: #E05555; --green: #00B87A; --border: #D4EEF0; --border2: #C0E4E6;
      --shadow-sm: 0 2px 8px rgba(13,32,48,0.06);
      --shadow-md: 0 6px 24px rgba(13,32,48,0.10);
    }
    html { scroll-behavior: smooth; }
    body { background: var(--off-white); color: var(--navy); font-family: 'Sora', sans-serif; line-height: 1.6; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 5%; height: 68px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark {
      width: 36px; height: 36px; background: var(--turquoise); border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 22px; height: 22px; }
    .logo-name { font-size: 1.25rem; font-weight: 800; color: var(--navy); letter-spacing: -0.01em; }
    .logo-name span { color: var(--turquoise); }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-link { color: var(--slate); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    .nav-link:hover { color: var(--navy); }
    .nav-cart-btn {
      position: relative; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 8px; color: var(--navy); transition: background 0.2s;
    }
    .nav-cart-btn:hover { background: var(--teal-light); }
    .cart-count {
      position: absolute; top: -4px; right: -4px;
      background: var(--turquoise); color: #fff; font-size: 0.58rem; font-weight: 700;
      min-width: 18px; height: 18px; border-radius: 9px; padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace; pointer-events: none;
    }

    /* CART DRAWER (shared with index) */
    .cart-backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(13,32,48,0.45); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .cart-backdrop.open { opacity: 1; pointer-events: all; }
    .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 201; width: 420px; max-width: 100vw; background: #fff; box-shadow: -8px 0 40px rgba(13,32,48,0.14); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.32, 0, 0.15, 1); }
    .cart-drawer.open { transform: translateX(0); }
    .cart-drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .cart-drawer-head h3 { font-family: 'Space Mono', monospace; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; color: var(--navy); }
    .cart-close-btn { background: none; border: none; cursor: pointer; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--slate); font-size: 1.3rem; transition: background 0.2s; }
    .cart-close-btn:hover { background: var(--teal-light); }
    .cart-items-scroll { flex: 1; overflow-y: auto; padding: 0 24px; }
    .cart-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 10px; color: var(--slate); font-size: 0.88rem; font-weight: 300; text-align: center; }
    .empty-box { font-size: 2.8rem; line-height: 1; }
    .c-item { display: grid; grid-template-columns: 44px 1fr auto; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--border); align-items: start; }
    .c-item:last-child { border-bottom: none; }
    .c-thumb { width: 44px; height: 44px; border-radius: 8px; background: var(--teal-light); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
    .c-name { font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700; color: var(--navy); margin-bottom: 2px; line-height: 1.3; }
    .c-variant { font-size: 0.7rem; color: var(--slate); font-weight: 300; margin-bottom: 8px; }
    .c-controls { display: flex; align-items: center; gap: 8px; }
    .c-price { font-family: 'Space Mono', monospace; font-size: 0.82rem; font-weight: 700; color: var(--turquoise); white-space: nowrap; }
    .c-remove { background: none; border: none; cursor: pointer; font-size: 0.7rem; color: var(--slate); font-family: 'Sora', sans-serif; padding: 0; transition: color 0.15s; }
    .c-remove:hover { color: var(--red); }
    .qty-c { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .qty-c button { background: none; border: none; cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--navy); font-size: 0.95rem; transition: background 0.15s; }
    .qty-c button:hover:not(:disabled) { background: var(--teal-light); }
    .qty-c button:disabled { opacity: 0.3; cursor: default; }
    .qty-c span { font-family: 'Space Mono', monospace; font-size: 0.75rem; font-weight: 700; color: var(--navy); min-width: 28px; text-align: center; }
    .cart-upsell-section { padding: 14px 24px; background: var(--off-white); border-top: 1px solid var(--border); flex-shrink: 0; }
    .cart-upsell-title { font-size: 0.65rem; font-weight: 700; color: var(--slate); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .c-upsell-item { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 7px; background: var(--white); border: 1px solid var(--border); margin-bottom: 6px; }
    .c-upsell-item:last-child { margin-bottom: 0; }
    .c-upsell-emoji { font-size: 1.2rem; }
    .c-upsell-name { font-size: 0.76rem; font-weight: 600; color: var(--navy); flex: 1; }
    .c-upsell-price { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--turquoise); }
    .c-upsell-add { background: var(--teal-light); border: 1px solid var(--teal-mid); color: var(--turquoise-dk); font-size: 0.65rem; font-weight: 700; padding: 4px 9px; border-radius: 4px; cursor: pointer; font-family: 'Sora', sans-serif; transition: background 0.15s; white-space: nowrap; }
    .c-upsell-add:hover { background: var(--teal-mid); }
    .cart-summary-section { padding: 14px 24px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .cs-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.83rem; margin-bottom: 7px; }
    .cs-lbl { color: var(--slate); font-weight: 300; }
    .cs-val { color: var(--navy); font-weight: 600; font-family: 'Space Mono', monospace; }
    .free-ship { color: var(--green) !important; }
    .cs-divider { height: 1px; background: var(--border); margin: 10px 0; }
    .cs-total-row { display: flex; justify-content: space-between; align-items: baseline; }
    .cs-total-lbl { font-size: 0.9rem; font-weight: 700; color: var(--navy); }
    .cs-total-val { font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .cart-cta-section { padding: 14px 24px 24px; flex-shrink: 0; }
    .btn-to-checkout { display: block; text-align: center; background: var(--turquoise); color: #fff; padding: 13px; border-radius: 9px; font-weight: 700; font-size: 0.9rem; text-decoration: none; letter-spacing: 0.02em; margin-bottom: 10px; transition: background 0.2s; }
    .btn-to-checkout:hover { background: var(--turquoise-dk); }
    .btn-cont-shop { display: block; text-align: center; background: none; border: none; color: var(--slate); font-size: 0.82rem; font-weight: 500; font-family: 'Sora', sans-serif; cursor: pointer; text-decoration: underline; transition: color 0.2s; width: 100%; }
    .btn-cont-shop:hover { color: var(--navy); }
    .toast-notif { position: fixed; top: 80px; right: 24px; z-index: 500; background: var(--navy); color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(13,32,48,0.2); transform: translateX(calc(100% + 48px)); transition: transform 0.35s cubic-bezier(0.32, 0, 0.15, 1); max-width: 300px; pointer-events: none; }
    .toast-notif.show { transform: translateX(0); }
    .toast-check { color: var(--green); font-weight: 700; }

    /* CART PAGE LAYOUT */
    .cart-page { max-width: 1200px; margin: 0 auto; padding: 48px 5% 80px; }
    .cart-page-title {
      font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800;
      letter-spacing: -0.02em; margin-bottom: 2rem;
    }
    .cart-layout {
      display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start;
    }

    /* Left - items */
    .cart-items-panel {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .cart-items-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace; font-size: 0.7rem;
      color: var(--slate); letter-spacing: 0.1em; text-transform: uppercase;
    }

    .cart-line {
      display: grid; grid-template-columns: 70px 1fr auto;
      gap: 18px; padding: 20px 24px; border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .cart-line:last-of-type { border-bottom: none; }
    .cart-line-thumb {
      width: 70px; height: 70px; border-radius: 10px;
      background: var(--teal-light); display: flex;
      align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0;
    }
    .cart-line-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
    .cart-line-desc { font-size: 0.78rem; color: var(--slate); font-weight: 300; margin-bottom: 10px; }
    .cart-line-unit { font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--slate-light); }
    .cart-line-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .cart-line-total { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--navy); }
    .cart-line-remove { font-size: 0.72rem; color: var(--slate); background: none; border: none; cursor: pointer; font-family: 'Sora', sans-serif; transition: color 0.2s; }
    .cart-line-remove:hover { color: var(--red); }

    .cart-page-links {
      display: flex; align-items: center; gap: 1.5rem;
      padding: 18px 24px; flex-wrap: wrap;
    }
    .cart-page-link {
      font-size: 0.82rem; color: var(--slate); text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px; font-weight: 500;
      background: none; border: none; cursor: pointer; font-family: 'Sora', sans-serif;
      transition: color 0.2s;
    }
    .cart-page-link:hover { color: var(--navy); }
    .cart-page-link.danger:hover { color: var(--red); }

    /* Right - summary */
    .cart-summary-panel {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px; position: sticky; top: 84px;
    }
    .summary-title {
      font-family: 'Space Mono', monospace; font-size: 0.72rem; font-weight: 700;
      color: var(--slate); letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px; font-size: 0.875rem;
    }
    .summary-row .s-lbl { color: var(--slate); font-weight: 300; }
    .summary-row .s-val { font-weight: 600; font-family: 'Space Mono', monospace; }
    .summary-row .s-val.free { color: var(--green); }
    .summary-divider { height: 1px; background: var(--border); margin: 14px 0; }
    .summary-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
    .summary-total-lbl { font-size: 1rem; font-weight: 700; }
    .summary-total-val { font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700; }
    .btn-checkout-page {
      display: block; width: 100%; text-align: center;
      background: var(--turquoise); color: #fff; padding: 14px;
      border-radius: 9px; font-weight: 700; font-size: 0.95rem;
      text-decoration: none; letter-spacing: 0.02em;
      transition: background 0.2s; margin-bottom: 16px;
    }
    .btn-checkout-page:hover { background: var(--turquoise-dk); }
    .trust-badges {
      display: flex; flex-direction: column; gap: 8px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .trust-badge {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: var(--slate); font-weight: 300;
    }

    /* Upsell */
    .cart-upsell-block { margin-top: 32px; }
    .cart-upsell-block h3 {
      font-family: 'Space Mono', monospace; font-size: 0.72rem;
      font-weight: 700; color: var(--slate); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 16px;
    }
    .upsell-scroll {
      display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px;
    }
    .upsell-scroll::-webkit-scrollbar { height: 4px; }
    .upsell-scroll::-webkit-scrollbar-track { background: var(--border); border-radius: 2px; }
    .upsell-scroll::-webkit-scrollbar-thumb { background: var(--turquoise); border-radius: 2px; }
    .upsell-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; min-width: 200px;
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }
    .upsell-card-thumb { font-size: 2rem; }
    .upsell-card-name { font-weight: 700; font-size: 0.85rem; }
    .upsell-card-price { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--turquoise); }
    .upsell-card-add {
      background: var(--teal-light); border: 1px solid var(--teal-mid);
      color: var(--turquoise-dk); font-size: 0.72rem; font-weight: 700;
      padding: 7px 12px; border-radius: 6px; cursor: pointer;
      font-family: 'Sora', sans-serif; text-align: center; transition: background 0.15s;
    }
    .upsell-card-add:hover { background: var(--teal-mid); }

    /* Empty state */
    .cart-empty-page {
      text-align: center; padding: 80px 24px;
      background: var(--white); border-radius: 14px; border: 1px solid var(--border);
    }
    .cart-empty-page .icon { font-size: 3.5rem; margin-bottom: 16px; }
    .cart-empty-page h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .cart-empty-page p { color: var(--slate); font-weight: 300; margin-bottom: 24px; }
    .btn-shop {
      display: inline-block; background: var(--turquoise); color: #fff;
      padding: 12px 28px; border-radius: 9px; font-weight: 700; font-size: 0.9rem;
      text-decoration: none; transition: background 0.2s;
    }
    .btn-shop:hover { background: var(--turquoise-dk); }

    /* Confirm modal */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(13,32,48,0.45); display: none;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--white); border-radius: 14px; padding: 32px;
      max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(13,32,48,0.2);
    }
    .modal h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
    .modal p { color: var(--slate); font-size: 0.88rem; font-weight: 300; margin-bottom: 24px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-cancel {
      flex: 1; padding: 11px; border-radius: 8px; font-family: 'Sora', sans-serif;
      font-weight: 600; font-size: 0.88rem; background: none;
      border: 1.5px solid var(--border); cursor: pointer; transition: border-color 0.2s;
    }
    .modal-cancel:hover { border-color: var(--border2); }
    .modal-confirm {
      flex: 1; padding: 11px; border-radius: 8px; font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 0.88rem; background: var(--red);
      color: #fff; border: none; cursor: pointer; transition: background 0.2s;
    }
    .modal-confirm:hover { background: #c44; }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-summary-panel { position: static; }
    }
  </style>
</head>
<body>

<!-- CART BACKDROP + DRAWER (shared) -->
<div id="cart-backdrop" class="cart-backdrop"></div>
<div id="cart-drawer" class="cart-drawer" role="dialog" aria-label="Shopping cart">
  <div class="cart-drawer-head">
    <h3>YOUR CART</h3>
    <button id="cart-close-btn" class="cart-close-btn">×</button>
  </div>
  <div id="cart-items-scroll" class="cart-items-scroll"></div>
  <div id="cart-upsell-section" class="cart-upsell-section" style="display:none"></div>
  <div id="cart-summary-section" class="cart-summary-section"></div>
  <div id="cart-cta-section" class="cart-cta-section" style="display:none">
    <a href="checkout.html" class="btn-to-checkout">PROCEED TO CHECKOUT →</a>
    <button class="btn-cont-shop" onclick="CartUI.closeDrawer()">CONTINUE SHOPPING</button>
  </div>
</div>
<div id="toast-notif" class="toast-notif" role="status" aria-live="polite"></div>

<!-- CLEAR CART MODAL -->
<div id="clear-modal" class="modal-backdrop">
  <div class="modal">
    <h3>Clear your cart?</h3>
    <p>This will remove all items from your cart. This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="document.getElementById('clear-modal').classList.remove('open')">Cancel</button>
      <button class="modal-confirm" onclick="Cart.clear();document.getElementById('clear-modal').classList.remove('open')">Clear Cart</button>
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <img src="Logo Rectangle.png" alt="NovaBuild Robotics" style="height:58px;width:auto;display:block;">
  </a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">← Continue Shopping</a>
    <button id="nav-cart-btn" class="nav-cart-btn" aria-label="View cart">
      <svg width="22" height="20" viewBox="0 0 22 20" fill="none">
        <path d="M1 1h3l2.4 9H17l2.6-6.5H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="18" r="1.5" fill="currentColor"/>
        <circle cx="16.5" cy="18" r="1.5" fill="currentColor"/>
      </svg>
      <span id="cart-count" class="cart-count" style="display:none">0</span>
    </button>
  </div>
</nav>

<!-- CART PAGE CONTENT -->
<main class="cart-page">
  <h1 class="cart-page-title">Your Cart</h1>
  <div id="cart-page-body"></div>
</main>

<script src="novabuild.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  renderCartPage();
});

function renderCartPage() {
  const body = document.getElementById('cart-page-body');
  const items = Cart.get();

  if (!items.length) {
    body.innerHTML = `
      <div class="cart-empty-page">
        <div class="icon">📦</div>
        <h2>Your cart is empty</h2>
        <p>Looks like you haven't added any kits yet.</p>
        <a href="index.html#products" class="btn-shop">SHOP KITS →</a>
      </div>`;
    return;
  }

  const sub  = Cart.subtotal();
  const ship = Cart.shipping();
  const total = Cart.total();
  const remaining = Math.max(0, 99 - sub);
  const inCart = items.map(i => i.id);
  const ACTIVE = ['sol12','sol6exp','solwave','scilab120','sol25'];
  const upsells = ACTIVE.filter(id => !inCart.includes(id)).map(id => PRODUCTS[id]).filter(Boolean);

  body.innerHTML = `
    <div class="cart-layout">
      <!-- Items -->
      <div>
        <div class="cart-items-panel">
          <div class="cart-items-panel-header">
            <span>Product</span><span>Total</span>
          </div>
          ${items.map(({ id, qty }) => {
            const p = PRODUCTS[id]; if (!p) return '';
            return `
              <div class="cart-line" id="line-${id}">
                <div class="cart-line-thumb">${p.emoji}</div>
                <div>
                  <div class="cart-line-name">${p.name}</div>
                  <div class="cart-line-desc">${p.variant} · Ages ${p.ages}</div>
                  <div class="cart-line-unit">AUD $${p.price.toFixed(2)} each</div>
                  <div style="margin-top:10px">
                    <div class="qty-c">
                      <button onclick="pageSetQty('${id}',${qty-1})"${qty<=1?' disabled':''}>−</button>
                      <span id="page-qty-${id}">${qty}</span>
                      <button onclick="pageSetQty('${id}',${qty+1})"${qty>=10?' disabled':''}>+</button>
                    </div>
                  </div>
                </div>
                <div class="cart-line-right">
                  <span class="cart-line-total">$${(p.price * qty).toFixed(2)}</span>
                  <button class="cart-line-remove" onclick="removeLine('${id}')">✕ Remove</button>
                </div>
              </div>`;
          }).join('')}
          <div class="cart-page-links">
            <a href="index.html" class="cart-page-link">← Continue Shopping</a>
            <button class="cart-page-link danger" onclick="document.getElementById('clear-modal').classList.add('open')">🗑 Clear Cart</button>
          </div>
        </div>

        ${upsells.length ? `
          <div class="cart-upsell-block">
            <h3>Complete Your Order</h3>
            <div class="upsell-scroll">
              ${upsells.map(p => `
                <div class="upsell-card">
                  <div class="upsell-card-thumb">${p.emoji}</div>
                  <div class="upsell-card-name">${p.name}</div>
                  <div class="upsell-card-price">AUD $${p.price.toFixed(2)}</div>
                  <button class="upsell-card-add" onclick="Cart.add('${p.id}',1);CartUI.showToast('${p.name} added');renderCartPage()">+ ADD TO CART</button>
                </div>`).join('')}
            </div>
          </div>` : ''}
      </div>

      <!-- Summary -->
      <div class="cart-summary-panel">
        <div class="summary-title">Order Summary</div>
        ${remaining > 0 ? `<div style="background:#E0FAFA;border:1px solid #B8ECEC;border-radius:8px;padding:10px 14px;font-size:0.78rem;color:#009E9E;font-weight:500;margin-bottom:14px;">Add <strong>$${remaining.toFixed(2)}</strong> more for free</div>` : ''}
        <div class="summary-row"><span class="s-lbl">Subtotal</span><span class="s-val">AUD $${sub.toFixed(2)}</span></div>
        <div class="summary-row"><span class="s-lbl">Shipping</span><span class="s-val ${ship === 0 ? 'free' : ''}"> ${ship === 0 ? 'FREE' : 'AUD $' + ship.toFixed(2)}</span></div>
        <div class="summary-divider"></div>
        <div class="summary-total-row">
          <span class="summary-total-lbl">Total</span>
          <span class="summary-total-val">AUD $${total.toFixed(2)}</span>
        </div>
        <a href="checkout.html" class="btn-checkout-page">PROCEED TO CHECKOUT →</a>
        <div class="trust-badges">
          <div class="trust-badge">🔒 SSL Secure checkout</div>
          <div class="trust-badge">📦 Free Australian shipping</div>
          <div class="trust-badge">↩️ 30-day returns</div>
        </div>
      </div>
    </div>`;
}

function pageSetQty(id, qty) {
  Cart.setQty(id, qty);
  renderCartPage();
}
function removeLine(id) {
  Cart.remove(id);
  renderCartPage();
}
</script>
</body>
</html>

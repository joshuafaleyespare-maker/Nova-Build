<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — NovaBuild</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #fff; --off-white: #F5F9FA; --teal-light: #E0FAFA;
      --teal-mid: #B8ECEC; --turquoise: #00C9C9; --turquoise-dk: #009E9E;
      --navy: #0D2030; --slate: #4A6B7A; --slate-light: #7A9AAA;
      --green: #00B87A; --border: #D4EEF0;
      --shadow-sm: 0 2px 8px rgba(13,32,48,0.06);
    }
    body { background: var(--off-white); color: var(--navy); font-family: 'Sora', sans-serif; line-height: 1.6; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: center;
      padding: 0 5%; height: 64px;
      background: var(--white); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .logo img { height: 52px; width: auto; display: block; }

    .page { max-width: 680px; margin: 0 auto; padding: 40px 5% 80px; }

    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--slate); font-weight: 300; margin-bottom: 32px; font-size: 0.9rem; }

    .cart-item {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px; margin-bottom: 16px;
      display: flex; align-items: center; gap: 18px;
    }
    .item-thumb {
      width: 56px; height: 56px; border-radius: 10px;
      background: var(--teal-light); display: flex; align-items: center;
      justify-content: center; font-size: 1.6rem; flex-shrink: 0;
      overflow: hidden;
    }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item-info { flex: 1; }
    .item-name { font-weight: 700; font-size: 0.95rem; }
    .item-qty { font-size: 0.78rem; color: var(--slate); font-weight: 300; margin-top: 2px; }
    .item-price { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
    .btn-pay {
      display: inline-block; background: var(--turquoise); color: #fff;
      padding: 10px 20px; border-radius: 8px; font-weight: 700; font-size: 0.85rem;
      text-decoration: none; transition: background 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-pay:hover { background: var(--turquoise-dk); }
    .btn-pay-unavailable {
      display: inline-block; background: #eee; color: var(--slate);
      padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 0.85rem;
      white-space: nowrap; flex-shrink: 0; cursor: not-allowed;
    }

    .empty { text-align: center; padding: 60px 0; color: var(--slate); }
    .empty a { color: var(--turquoise); text-decoration: none; font-weight: 600; }

    .info-box {
      background: var(--teal-light); border: 1px solid var(--teal-mid);
      border-radius: 10px; padding: 14px 18px; margin-bottom: 24px;
      font-size: 0.82rem; color: var(--slate); font-weight: 300; line-height: 1.6;
    }
    .info-box strong { color: var(--navy); font-weight: 600; }

    .back-link { display: inline-block; margin-top: 20px; color: var(--slate); font-size: 0.85rem; text-decoration: underline; }
    .back-link:hover { color: var(--navy); }

    @media (max-width: 600px) {
      .cart-item { flex-wrap: wrap; }
      .btn-pay, .btn-pay-unavailable { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <img src="Logo Rectangle.png" alt="NovaBuild" />
  </a>
</nav>

<div class="page">
  <h1>Review & Pay</h1>
  <p class="subtitle">Each item links to our secure Stripe payment page.</p>

  <div class="info-box">
    🔒 <strong>Secure checkout via Stripe.</strong> Your shipping address and card details are collected on Stripe's encrypted page. You'll receive an order confirmation email after payment.
  </div>

  <div id="items-container"></div>

  <a href="cart.html" class="back-link">← Return to cart</a>
</div>

<script src="products-config.js"></script>
<script src="novabuild.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const items = Cart.get();
  const container = document.getElementById('items-container');

  if (!items.length) {
    container.innerHTML = `
      <div class="empty">
        <p style="font-size:1.1rem;margin-bottom:12px">Your cart is empty.</p>
        <a href="index.html">← Continue shopping</a>
      </div>`;
    return;
  }

  container.innerHTML = items.map(({ id, qty }) => {
    const p = PRODUCTS[id];
    if (!p) return '';
    const total = (p.price * qty).toFixed(2);
    const thumb = PRODUCT_DETAILS?.[id]?.image
      ? `<img src="${PRODUCT_DETAILS[id].image}" alt="${p.name}">`
      : p.emoji;
    const payBtn = p.paymentLink
      ? `<a class="btn-pay" href="${p.paymentLink}" target="_blank">Pay A$${total} →</a>`
      : `<span class="btn-pay-unavailable">Contact us</span>`;
    return `
      <div class="cart-item">
        <div class="item-thumb">${typeof thumb === 'string' && thumb.startsWith('<img') ? thumb : `<span>${thumb}</span>`}</div>
        <div class="item-info">
          <div class="item-name">${p.name}</div>
          <div class="item-qty">Qty: ${qty}</div>
        </div>
        <div class="item-price">A$${total}</div>
        ${payBtn}
      </div>`;
  }).join('');
});
</script>
</body>
</html>
